# Version de Docker Compose
services:
    # =====================
    # SERVICE PHP — Symfony
    # =====================
    php:
        # Construction depuis notre Dockerfile personnalisé
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: project_manager_php
        # Variables d'environnement Symfony
        environment:
            APP_ENV: prod
            APP_SECRET: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
            DATABASE_URL: mysql://root:rootpassword@mysql:3306/project_manager?serverVersion=8.0&charset=utf8mb4
            JWT_SECRET_KEY: /var/www/html/config/jwt/private.pem
            JWT_PUBLIC_KEY: /var/www/html/config/jwt/public.pem
            JWT_PASSPHRASE: projectmanager
            CORS_ALLOW_ORIGIN: http://localhost:3000
        # Volumes pour persister les données
        volumes:
            - ./var:/var/www/html/var
        # Dépend du service MySQL
        depends_on:
            mysql:
                condition: service_healthy
        networks:
            - project_manager_network

    # =====================
    # SERVICE NGINX — Serveur web
    # =====================
    nginx:
        # Image officielle Nginx
        image: nginx:alpine
        container_name: project_manager_nginx
        # Port exposé — accès via http://localhost:8080
        ports:
            - "8080:80"
        # Volumes pour la config et le code
        volumes:
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
            - ./public:/var/www/html/public
        # Dépend du service PHP
        depends_on:
            - php
        networks:
            - project_manager_network

    # =====================
    # SERVICE MYSQL — Base de données
    # =====================
    mysql:
        # Image officielle MySQL 8.0
        image: mysql:8.0
        container_name: project_manager_mysql
        # Variables d'environnement MySQL
        environment:
            MYSQL_ROOT_PASSWORD: rootpassword
            MYSQL_DATABASE: project_manager
            MYSQL_USER: symfony
            MYSQL_PASSWORD: symfony
        # Port exposé — accès via localhost:3307
        ports:
            - "3307:3306"
        # Volume pour persister les données MySQL
        volumes:
            - mysql_data:/var/lib/mysql
        # Healthcheck pour s'assurer que MySQL est prêt
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-u",
                    "root",
                    "-prootpassword",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - project_manager_network

    # =====================
    # SERVICE PHPMYADMIN — Interface MySQL
    # =====================
    phpmyadmin:
        # Image officielle phpMyAdmin
        image: phpmyadmin/phpmyadmin
        container_name: project_manager_phpmyadmin
        # Port exposé — accès via http://localhost:8081
        ports:
            - "8081:80"
        # Configuration de connexion
        environment:
            PMA_HOST: mysql
            PMA_USER: root
            PMA_PASSWORD: rootpassword
        depends_on:
            - mysql
        networks:
            - project_manager_network

# =====================
# VOLUMES PERSISTANTS
# =====================
volumes:
    mysql_data:
        driver: local

# =====================
# RÉSEAU DOCKER
# =====================
networks:
    project_manager_network:
        driver: bridge
