security:
    # Configuration du hashage des mots de passe
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"

    # Configuration des providers
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # Configuration des firewalls
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Firewall pour les routes protégées par JWT (me, profile, avatar)
        api_protected:
            pattern: ^/api/auth/(me|profile|avatar)
            stateless: true
            jwt: ~

        # Firewall pour les routes publiques (login, register, forgot, reset, oauth, 2fa)
        api_public:
            pattern: ^/api/(auth|push/send|push/vapid-key)
            stateless: true
            security: false

        # Firewall pour les routes protégées par JWT
        api:
            pattern: ^/api
            stateless: true
            jwt: ~

    # Contrôle d'accès — routes protégées
    access_control:
        # Routes protégées auth
        - { path: ^/api/auth/me, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/auth/profile, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/auth/avatar, roles: IS_AUTHENTICATED_FULLY }
        # Routes publiques auth
        - { path: ^/api/auth, roles: PUBLIC_ACCESS }
        # Routes protégées — token JWT requis
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
