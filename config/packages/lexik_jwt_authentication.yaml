lexik_jwt_authentication:
    secret_key: "%env(resolve:JWT_SECRET_KEY)%"
    public_key: "%env(resolve:JWT_PUBLIC_KEY)%"
    pass_phrase: "%env(JWT_PASSPHRASE)%"
    token_ttl: 86400 # 1 heure en secondes


# augmenter token_ttl :
# exemple : token_ttl: 86400 # 1 heure en secondes
# 3600 = 1 heure
# 86400 = 24 heures
# 604800 = 7 jours
