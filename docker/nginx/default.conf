server {
    # Port d'écoute Nginx
    listen 80;

    # Dossier racine de l'application Symfony
    root /var/www/html/public;

    # Fichier index par défaut
    index index.php;

    # Nom du serveur
    server_name localhost;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gestion des requêtes
    location / {
        # Redirige vers index.php si le fichier n'existe pas
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Traitement des fichiers PHP par PHP-FPM
    location ~ \.php$ {
        # Passage des requêtes PHP au conteneur PHP-FPM
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Interdiction d'accès aux fichiers .htaccess
    location ~ /\.ht {
        deny all;
    }

    # Cache pour les assets statiques
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }
}
