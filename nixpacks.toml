[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "php82Packages.composer"]

[phases.install]
cmds = ["COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = ["rm -rf var/cache/*", "APP_ENV=prod php bin/console cache:warmup"]

[start]
cmd = "php -S 0.0.0.0:8080 -t public/ public/index.php"
